name: Hat Rack
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  Hat Rack:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Hat Rack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.hatrack
        INFOPLIST_FILE: Hat Rack/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        SUPPORTS_MACCATALYST: NO
    info:
      path: Hat Rack/Info.plist
      properties:
        CFBundleDisplayName: Hat Rack
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
  Hat RackTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Hat RackTests
    dependencies:
      - target: Hat Rack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.hatrack.tests
  Hat RackUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Hat RackUITests
    dependencies:
      - target: Hat Rack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.hatrack.uitests
schemes:
  Hat Rack:
    build:
      targets:
        Hat Rack: all
    test:
      targets:
        - Hat RackTests
        - Hat RackUITests
    run:
      config: Debug
    archive:
      config: Release
